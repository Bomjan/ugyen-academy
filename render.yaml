databases:
  - name: ugyen-academy-db
    databaseName: ugyen_academy
    user: ugyen_academy
    plan: free

services:
  # ── Backend API (Go) ────────────────────────────
  - type: web
    name: ugyen-academy-api
    runtime: go
    plan: free
    rootDir: backend
    buildCommand: go build -o app .
    startCommand: ./app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ugyen-academy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false   # set to your static site URL after first deploy
      - key: GIN_MODE
        value: release

  # ── Frontend (React Static Site) ────────────────
  - type: static
    name: ugyen-academy-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false   # set to https://ugyen-academy-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
